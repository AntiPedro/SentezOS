name: SentezOS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-compile:
    name: SentezOS ISO Derleme
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Arch Linux Araçlarını Kur
        run: pacman -Syu --noconfirm base-devel arch-install-scripts archiso

      - name: Ortamı SentezOS İçin Hazırla (Core Harmanlama)
        run: |
          echo "Arch Linux'un resmi iskeleti kopyalanıyor..."
          mkdir -p tmp-iso
          cp -r /usr/share/archiso/configs/releng/* tmp-iso/
          echo "SentezOS özel ayarları iskeletin üzerine yazılıyor..."
          cp -rf iso-build/* tmp-iso/ || true

      - name: SentezOS ISO İmajını Üret!
        run: |
          echo "SentezOS Bootable ISO inşası başlıyor..."
          # Artık sahte başarı (|| true) yok. Hata verirse bilecek, vermezse gerçek ISO'yu üretecek.
          mkarchiso -v -w /tmp/work -o out/ tmp-iso/

      - name: ISO Dosyasını Hazırla (İndirme Linki)
        uses: actions/upload-artifact@v4
        with:
          name: SentezOS-LiveCD
          path: out/*.iso
