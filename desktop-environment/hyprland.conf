# SENTEZ OS HYPRLAND DE CONFIGURATION
# Compositor and Display Manager settings

monitor=,preferred,auto,1

# Core System Daemons
exec-once = sddm
exec-once = /usr/local/bin/sentez-panel  # Custom Qt6 C++ panelimiz
exec-once = python3 /opt/sentez-cloud/sync_daemon.py # Cloud sync servisi
exec-once = swaybg -i /usr/share/backgrounds/sentez/default.png # Arkaplan

# SentezOS Modern UI & Glassmorphism Ayarları
decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
    }
    drop_shadow = yes
    shadow_range = 15
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# Yumusak Animasyonlar The Apple Way
animations {
    enabled = yes
    bezier = sentezBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, sentezBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Workspace and App Keybinds
$mainMod = SUPER
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, dolphin # Qt File Manager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, rofi -show drun

# Window Snapping (Edge tilling magic)
dwindle {
    pseudotile = yes
    preserve_split = yes
}
